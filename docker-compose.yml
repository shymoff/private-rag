services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama

  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      # Baza wektorowa — żeby nie rebuildować obrazu po każdym ingeście
      - ./chroma_db:/app/chroma_db
      - ./data:/app/data
      # Cache HuggingFace — żeby embeddingi nie pobierały się przy każdym starcie
      - hf_cache:/root/.cache/huggingface
    depends_on:
      - ollama

volumes:
  ollama_models:
  hf_cache:

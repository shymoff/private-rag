services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama

  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      # Cache HuggingFace — żeby embeddingi nie pobierały się przy każdym starcie.
      # Baza wektorowa jest in-memory per sesja, więc nic więcej nie montujemy.
      - hf_cache:/root/.cache/huggingface
    depends_on:
      - ollama

volumes:
  ollama_models:
  hf_cache:
